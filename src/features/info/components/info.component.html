<div class="screen">
  <symo-top-bar [title]="'info.title' | transloco" />

  <div class="content">
    <div class="intro">
      <h2>{{ 'info.heading' | transloco }}</h2>
      <p>{{ 'info.subheading' | transloco }}</p>
    </div>

    <div class="fields">
      <div class="field">
        <label>
          {{ 'info.allergies' | transloco }}
          <span class="optional">({{ 'info.optional' | transloco }})</span>
        </label>
        <symo-searchable-multiselect-dropdown
          [options]="allergyOptions"
          [value]="store.userInfo().allergies"
          (valueChange)="update('allergies', $event)"
          [placeholder]="'info.allergiesPlaceholder' | transloco"
          [addLabel]="'info.addCustom' | transloco"
          [emptyLabel]="'info.noResults' | transloco"
        />
      </div>

      <div class="field">
        <label>
          {{ 'info.medications' | transloco }}
          <span class="optional">({{ 'info.optional' | transloco }})</span>
        </label>
        <symo-searchable-multiselect-dropdown
          [options]="medicationOptions"
          [value]="store.userInfo().medications"
          (valueChange)="update('medications', $event)"
          [placeholder]="'info.medicationsPlaceholder' | transloco"
          [addLabel]="'info.addCustom' | transloco"
          [emptyLabel]="'info.noResults' | transloco"
        />
      </div>

      <div class="field">
        <label>
          {{ 'info.history' | transloco }}
          <span class="optional">({{ 'info.optional' | transloco }})</span>
        </label>
        <symo-searchable-multiselect-dropdown
          [options]="historyOptions"
          [value]="store.userInfo().history"
          (valueChange)="update('history', $event)"
          [placeholder]="'info.historyPlaceholder' | transloco"
          [addLabel]="'info.addCustom' | transloco"
          [emptyLabel]="'info.noResults' | transloco"
        />
      </div>
    </div>
  </div>

  <div class="footer">
    <button type="button" class="generate" (click)="next()">
      {{ 'info.generate' | transloco }}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6" />
      </svg>
    </button>
  </div>
</div>
