<div class="screen">
  <symo-top-bar [title]="'pin.title' | transloco" />

  <!-- simple front/back text, centered under the bar -->
  <p class="side-label">
    {{ (side() === 'front' ? 'pin.front' : 'pin.back') | transloco }}
  </p>

  <div class="body-area">
    <!-- flip button, top-right like the mockup -->
    <button type="button" class="flip-btn" (click)="flip()"
            [attr.aria-label]="'pin.flip' | transloco">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
        <path d="M21 3v5h-5" />
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
        <path d="M3 21v-5h5" />
      </svg>
    </button>

    <!-- 3D flip card -->
    <div class="card">
      <div class="card-inner" [class.flipped]="side() === 'back'">
        <div class="face front">
          <img [src]="frontSrc()" alt="Body front view" draggable="false" />
        </div>
        <div class="face back">
          <img [src]="backSrc()" alt="Body back view" draggable="false" />
        </div>
      </div>
    </div>
  </div>

  <!-- bottom action row (erase + indicator + next; not wired yet) -->
  <div class="bottom-bar">
    <button type="button" class="tool-btn" disabled
            [attr.aria-label]="'pin.clear' | transloco">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21" />
        <path d="M22 21H7" />
        <path d="m5 11 9 9" />
      </svg>
    </button>

    <div class="tool-btn indicator" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="rgba(91,155,255,0.35)" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
        <circle cx="12" cy="10" r="3" fill="#fff" />
      </svg>
    </div>

    <button type="button" class="tool-btn next" disabled
            [attr.aria-label]="'pin.next' | transloco">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6" />
      </svg>
    </button>
  </div>
</div>
